name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone foliate-js dependency
        run: |
          echo "Cloning foliate-js for deployment..."
          git clone --depth 1 https://github.com/johnfactotum/foliate-js.git /tmp/foliate-js
          rm -rf /tmp/foliate-js/.git

      - name: Prepare deployment directory
        run: |
          echo "Creating deployment directory outside git workspace..."
          mkdir -p /tmp/deploy
          cp -r epub-migration-showcase/* /tmp/deploy/
          cp -r /tmp/foliate-js /tmp/deploy/foliate-js
          touch /tmp/deploy/.nojekyll
          echo "Deployment directory ready at /tmp/deploy"

      - name: Verify structure
        run: |
          echo "=== Deployment directory structure ==="
          ls -la /tmp/deploy/ | head -10
          echo ""
          echo "=== foliate-js exists? ==="
          ls -la /tmp/deploy/foliate-js/ | head -5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
